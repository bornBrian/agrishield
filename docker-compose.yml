version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: agrishield_postgres
    environment:
      POSTGRES_DB: agrishield
      POSTGRES_USER: agrishield_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agrishield_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrishield_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: agrishield_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # TomEE Application Server (built from Dockerfile)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrishield_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Java
      JAVA_HOME: /usr/lib/jvm/java-25-openjdk-amd64
      JAVA_OPTS: "-Xmx2G -Xms1G"

      # Database
      DB_URL: "jdbc:postgresql://postgres:5432/agrishield"
      DB_USER: agrishield_user
      DB_PASSWORD: ${DB_PASSWORD:-agrishield_password}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID}

      # SMS (Twilio)
      TWILIO_ENABLED: ${TWILIO_ENABLED:-true}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}

      # Auth Config
      AUTH_SOCIAL_MODE: ${AUTH_SOCIAL_MODE:-demo}
      AUTH_DEBUG_RESET_CODE: ${AUTH_DEBUG_RESET_CODE:-true}

      # Domain
      DOMAIN: ${DOMAIN:-localhost}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    ports:
      - "8080:8080"
    volumes:
      - ./agrishield/src/main/resources:/app/resources
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: agrishield_nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./frontend_dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: agrishield
